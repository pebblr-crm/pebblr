version: "2"

run:
  go: "1.24"

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive
    - tparallel
    - paralleltest

  exclusions:
    paths:
      - web/node_modules
      - web-v2/node_modules
    rules:
      # Ginkgo/Gomega idiomatically use dot imports and test runners are not parallelizable.
      - path: test/e2e/
        linters:
          - revive
          - paralleltest

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code

output:
  formats:
    text:
      path: stderr
  sort-order:
    - linter
    - severity
    - file
