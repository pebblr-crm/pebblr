apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: pebblr

build:
  artifacts:
    - image: pebblr-api
      docker:
        dockerfile: Dockerfile
        buildArgs:
          VITE_GOOGLE_MAPS_API_KEY: "{{ .VITE_GOOGLE_MAPS_API_KEY }}"
  local:
    push: false
    useBuildkit: true

manifests:
  helm:
    releases:
      - name: pebblr
        chartPath: deploy/helm/pebblr
        namespace: pebblr
        createNamespace: true
        setValueTemplates:
          image.repository: "{{.IMAGE_REPO_pebblr_api}}"
          image.tag: "{{.IMAGE_TAG_pebblr_api}}"

# 'kind' profile: activated automatically when kubeContext is kind-pebblr-local.
# Overrides resource limits to dev-appropriate values.
profiles:
  - name: kind
    activation:
      - kubeContext: kind-pebblr-local
    manifests:
      helm:
        releases:
          - name: pebblr
            chartPath: deploy/helm/pebblr
            namespace: pebblr
            createNamespace: true
            valuesFiles:
              - deploy/helm/pebblr/values.yaml
              - deploy/helm/pebblr/values-local.yaml
            setValueTemplates:
              image.repository: "{{.IMAGE_REPO_pebblr_api}}"
              image.tag: "{{.IMAGE_TAG_pebblr_api}}"
            setValues:
              resources.requests.cpu: "50m"
              resources.requests.memory: "64Mi"
              resources.limits.cpu: "200m"
              resources.limits.memory: "256Mi"

  - name: e2e
    build:
      artifacts:
        - image: pebblr-api
          docker:
            dockerfile: Dockerfile
            buildArgs:
              VITE_STATIC_TOKEN: "local-jwt-secret-not-for-production"
    manifests:
      helm:
        releases:
          - name: pebblr-e2e
            chartPath: deploy/helm/pebblr
            namespace: pebblr-e2e
            createNamespace: true
            valuesFiles:
              - deploy/helm/pebblr/values.yaml
              - deploy/helm/pebblr/values-e2e.yaml
            setValueTemplates:
              image.repository: "{{.IMAGE_REPO_pebblr_api}}"
              image.tag: "{{.IMAGE_TAG_pebblr_api}}"
