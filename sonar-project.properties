sonar.projectKey=pebblr-crm_pebblr
sonar.organization=pebblr-crm
sonar.projectName=Pebblr CRM

# Sources
sonar.sources=cmd,internal,web/src,web-legacy/src
sonar.tests=internal,web/src,web-legacy/src
sonar.test.inclusions=**/*_test.go,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/vendor/**,**/*.gen.go

# Go coverage
sonar.go.coverage.reportPaths=coverage.out

# TypeScript / JavaScript coverage (both frontends)
sonar.typescript.lcov.reportPaths=web/coverage/lcov.info,web-legacy/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
