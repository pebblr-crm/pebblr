<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Activity Submission - Pebblr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            200: '#99f6e4',
                            300: '#5eead4',
                            400: '#2dd4bf',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e4a',
                            950: '#042f2e',
                        },
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        },
                        priority: {
                            a: '#ef4444',
                            b: '#f59e0b',
                            c: '#64748b'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 -4px 20px -2px rgba(0, 0, 0, 0.1)',
                        'card': '0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24)',
                    }
                }
            }
        }
    </script>
    <script> window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overscroll-behavior-y: none; }
        ::-webkit-scrollbar { display: none; }
        
        /* Bottom Sheet Animation */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .bottom-sheet {
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Map Background Simulation */
        .map-bg {
            background-color: #e5e7eb;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-slate-100 w-full min-h-screen m-0 flex flex-col overflow-hidden relative map-bg">

    <!-- Simulated Map Context (Background) -->
    <div id="map-context" class="absolute inset-0 z-0">
        <!-- Map UI Elements (Simulated) -->
        <div class="absolute top-4 left-4 right-4 flex justify-between items-start z-10">
            <div class="bg-white p-3 rounded-full shadow-md flex items-center justify-center w-10 h-10">
                <i class="fa-solid fa-bars text-slate-700"></i>
            </div>
            <div class="bg-white px-4 py-2 rounded-full shadow-md flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-brand-500"></span>
                <span class="text-sm font-semibold text-slate-700">Tracking Active</span>
            </div>
        </div>

        <!-- Simulated Map Pins -->
        <div class="absolute top-1/4 left-1/4">
            <div class="w-8 h-8 bg-priority-a rounded-full border-2 border-white shadow-md flex items-center justify-center text-white text-xs font-bold">A</div>
        </div>
        <div class="absolute top-1/3 right-1/4">
            <div class="w-8 h-8 bg-priority-b rounded-full border-2 border-white shadow-md flex items-center justify-center text-white text-xs font-bold">B</div>
        </div>
        <div class="absolute bottom-1/3 left-1/3">
            <div class="w-8 h-8 bg-priority-c rounded-full border-2 border-white shadow-md flex items-center justify-center text-white text-xs font-bold">C</div>
        </div>
        
        <!-- Current Location Pin -->
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
            <div class="w-6 h-6 bg-brand-500 rounded-full border-4 border-white shadow-lg relative">
                <div class="absolute inset-0 rounded-full bg-brand-500 animate-ping opacity-75"></div>
            </div>
        </div>
    </div>

    <!-- Bottom Sheet Overlay -->
    <div class="absolute inset-0 bg-slate-900/60 z-40 backdrop-blur-sm transition-opacity flex items-center justify-center p-4">

    <!-- Desktop Modal Container -->
    <div id="desktop-modal" class="w-full max-w-2xl bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden relative z-50">
        
        <!-- Header & Progress -->
        <div class="px-8 py-6 border-b border-slate-100 shrink-0 bg-white">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h2 class="text-xl font-bold text-slate-900">Log Activity</h2>
                    <p class="text-sm text-slate-500 mt-1">Record the outcome of your visit</p>
                </div>
                <button class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition-colors">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            
            <!-- Progress Indicator (Step 1/2) -->
            <div class="flex items-center gap-3">
                <div class="flex-1 h-2 bg-brand-500 rounded-full"></div>
                <div class="flex-1 h-2 bg-slate-100 rounded-full"></div>
            </div>
            <div class="flex justify-between mt-2 text-sm font-medium text-slate-500">
                <span class="text-brand-600 font-semibold">Step 1: Outcome</span>
                <span>Step 2: Notes</span>
            </div>
        </div>

        <!-- Scrollable Content Area -->
        <div class="px-8 py-8 overflow-y-auto flex-1 space-y-8 bg-slate-50/50">
            
            <!-- Target Context Card -->
            <div class="bg-white border border-slate-200 shadow-sm rounded-xl p-5 flex gap-5 items-center">
                <div class="w-14 h-14 rounded-full bg-brand-50 flex items-center justify-center text-brand-600 flex-shrink-0 border border-brand-100">
                    <i class="fa-solid fa-hospital text-2xl"></i>
                </div>
                <div class="flex-1">
                    <div class="flex items-center gap-3 mb-1">
                        <h3 class="text-lg font-bold text-slate-900">City General Hospital</h3>
                        <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-md text-xs font-bold bg-red-50 text-red-700 border border-red-100">
                            <span class="w-2 h-2 rounded-full bg-priority-a"></span> Priority A
                        </span>
                    </div>
                    <p class="text-sm text-slate-500 flex items-center gap-2">
                        <i class="fa-solid fa-location-dot text-slate-400"></i>
                        123 Main St, Downtown
                    </p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Left Column: Activity Type & Quick Tags -->
                <div class="space-y-6">
                    <!-- Activity Type -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Activity Type</label>
                        <div class="relative">
                            <select class="w-full appearance-none bg-white border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 block p-3.5 pr-10 shadow-sm font-medium transition-shadow">
                                <option selected>In-Person Visit</option>
                                <option>Virtual Call</option>
                                <option>Drop-off / Sample</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                                <i class="fa-solid fa-chevron-down text-sm"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Quick Tags -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-3 flex justify-between items-center">
                            <span>Quick Tags</span>
                            <span class="bg-slate-100 text-slate-500 px-2 py-0.5 rounded text-xs font-medium">Optional</span>
                        </label>
                        <div class="flex flex-wrap gap-2">
                            <button class="px-3.5 py-2 rounded-lg border border-brand-200 bg-brand-50 text-brand-700 text-sm font-medium transition-colors hover:bg-brand-100 flex items-center gap-1.5">
                                <i class="fa-solid fa-check"></i> Left Samples
                            </button>
                            <button class="px-3.5 py-2 rounded-lg border border-slate-200 bg-white text-slate-600 text-sm font-medium hover:border-slate-300 hover:bg-slate-50 transition-colors">
                                Follow-up Required
                            </button>
                            <button class="px-3.5 py-2 rounded-lg border border-slate-200 bg-white text-slate-600 text-sm font-medium hover:border-slate-300 hover:bg-slate-50 transition-colors">
                                Decision Maker Present
                            </button>
                            <button class="px-3.5 py-2 rounded-lg border border-dashed border-slate-300 bg-slate-50 text-slate-500 text-sm font-medium hover:border-slate-400 hover:text-slate-700 transition-colors flex items-center gap-1.5">
                                <i class="fa-solid fa-plus text-xs"></i> Add Tag
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Outcome -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-3 flex items-center gap-1">
                        Outcome <span class="text-red-500">*</span>
                    </label>
                    <div class="grid grid-cols-2 gap-3">
                        <!-- Option 1: Completed -->
                        <label class="relative flex flex-col items-center justify-center p-5 border-2 border-brand-500 bg-brand-50/50 rounded-xl cursor-pointer shadow-sm transition-all hover:shadow-md">
                            <input type="radio" name="outcome" value="completed" class="sr-only" checked>
                            <div class="w-10 h-10 rounded-full bg-brand-100 flex items-center justify-center mb-3">
                                <i class="fa-solid fa-check text-brand-600 text-xl"></i>
                            </div>
                            <span class="text-sm font-bold text-brand-900">Completed</span>
                        </label>
                        
                        <!-- Option 2: Rescheduled -->
                        <label class="relative flex flex-col items-center justify-center p-5 border-2 border-slate-200 bg-white rounded-xl cursor-pointer hover:border-slate-300 hover:bg-slate-50 transition-all shadow-sm">
                            <input type="radio" name="outcome" value="rescheduled" class="sr-only">
                            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center mb-3">
                                <i class="fa-regular fa-calendar-plus text-slate-500 text-xl"></i>
                            </div>
                            <span class="text-sm font-semibold text-slate-700">Rescheduled</span>
                        </label>

                        <!-- Option 3: No Show -->
                        <label class="relative flex flex-col items-center justify-center p-5 border-2 border-slate-200 bg-white rounded-xl cursor-pointer hover:border-slate-300 hover:bg-slate-50 transition-all shadow-sm">
                            <input type="radio" name="outcome" value="noshow" class="sr-only">
                            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center mb-3">
                                <i class="fa-solid fa-user-xmark text-slate-500 text-xl"></i>
                            </div>
                            <span class="text-sm font-semibold text-slate-700">No Show</span>
                        </label>

                        <!-- Option 4: Cancelled -->
                        <label class="relative flex flex-col items-center justify-center p-5 border-2 border-slate-200 bg-white rounded-xl cursor-pointer hover:border-slate-300 hover:bg-slate-50 transition-all shadow-sm">
                            <input type="radio" name="outcome" value="cancelled" class="sr-only">
                            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center mb-3">
                                <i class="fa-solid fa-ban text-slate-500 text-xl"></i>
                            </div>
                            <span class="text-sm font-semibold text-slate-700">Cancelled</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer CTA -->
        <div class="px-8 py-5 border-t border-slate-100 bg-white shrink-0 flex items-center justify-end gap-3">
            <button class="px-6 py-2.5 rounded-lg border border-slate-200 text-slate-600 font-medium hover:bg-slate-50 hover:text-slate-900 transition-colors">
                Cancel
            </button>
            <button class="bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 px-8 rounded-lg shadow-sm hover:shadow transition-all flex items-center justify-center gap-2">
                Continue to Notes
                <i class="fa-solid fa-arrow-right text-sm"></i>
            </button>
        </div>
    </div>
    </div>

</body>
</html>
