<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Activity Submission - Step 2 - Pebblr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            200: '#99f6e4',
                            300: '#5eead4',
                            400: '#2dd4bf',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e4a',
                            950: '#042f2e',
                        },
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        },
                        priority: {
                            a: '#ef4444',
                            b: '#f59e0b',
                            c: '#64748b'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 -4px 20px -2px rgba(0, 0, 0, 0.1)',
                        'card': '0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24)',
                    }
                }
            }
        }
    </script>
    <script> window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overscroll-behavior-y: none; }
        ::-webkit-scrollbar { display: none; }
        
        /* Modal Animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-overlay {
            animation: fadeIn 0.2s ease-out forwards;
        }
        .modal-content {
            animation: scaleIn 0.2s ease-out forwards;
        }

        /* Map Background Simulation */
        .map-bg {
            background-color: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        /* Toast Animation */
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-enter {
            animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-slate-100 w-full min-h-screen m-0 flex flex-col overflow-hidden relative map-bg">

    <!-- Simulated Map Context (Background) -->
    <div id="map-context" class="absolute inset-0 z-0">
        <!-- Map UI Elements (Simulated) -->
        <div class="absolute top-4 left-4 right-4 flex justify-between items-start z-10">
            <div class="bg-white p-3 rounded-full shadow-md flex items-center justify-center w-10 h-10">
                <i class="fa-solid fa-bars text-slate-700"></i>
            </div>
            <div class="bg-white px-4 py-2 rounded-full shadow-md flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-brand-500"></span>
                <span class="text-sm font-semibold text-slate-700">Tracking Active</span>
            </div>
        </div>

        <!-- Simulated Map Pins -->
        <div class="absolute top-1/4 left-1/4">
            <div class="w-8 h-8 bg-priority-a rounded-full border-2 border-white shadow-md flex items-center justify-center text-white text-xs font-bold">A</div>
        </div>
        <div class="absolute top-1/3 right-1/4">
            <div class="w-8 h-8 bg-priority-b rounded-full border-2 border-white shadow-md flex items-center justify-center text-white text-xs font-bold">B</div>
        </div>
        <div class="absolute bottom-1/3 left-1/3">
            <div class="w-8 h-8 bg-priority-c rounded-full border-2 border-white shadow-md flex items-center justify-center text-white text-xs font-bold">C</div>
        </div>
        
        <!-- Current Location Pin -->
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
            <div class="w-6 h-6 bg-brand-500 rounded-full border-4 border-white shadow-lg relative">
                <div class="absolute inset-0 rounded-full bg-brand-500 animate-ping opacity-75"></div>
            </div>
        </div>
    </div>

    <!-- Bottom Sheet Overlay -->
    <div class="fixed inset-0 bg-slate-900/50 z-40 backdrop-blur-sm transition-opacity modal-overlay flex items-center justify-center p-4 sm:p-6">

        <!-- Modal Container (Desktop Centered) -->
        <div id="desktop-modal" class="w-full max-w-2xl bg-white rounded-2xl shadow-2xl flex flex-col modal-content max-h-[90vh] overflow-hidden relative">
            
            <!-- Header & Progress -->
            <div class="px-8 py-6 border-b border-slate-100 shrink-0 bg-white">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-4">
                        <button class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition-colors border border-slate-200">
                            <i class="fa-solid fa-arrow-left"></i>
                        </button>
                        <div>
                            <h2 class="text-xl font-bold text-slate-900">Log Activity</h2>
                            <p class="text-sm text-slate-500 mt-1">Step 2 of 2: Notes & Confirmation</p>
                        </div>
                    </div>
                    <button class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition-colors border border-slate-200">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                
                <!-- Progress Indicator -->
                <div class="flex items-center gap-2">
                    <div class="flex-1 h-2 bg-brand-500 rounded-full"></div>
                    <div class="flex-1 h-2 bg-brand-500 rounded-full shadow-[0_0_10px_rgba(20,184,166,0.5)]"></div>
                </div>
            </div>

            <!-- Scrollable Content Area -->
            <div class="px-8 py-8 overflow-y-auto flex-1 space-y-8 bg-slate-50/50">
                
                <!-- Target Context Card -->
                <div class="bg-white border border-slate-200 rounded-xl p-5 flex gap-4 items-center shadow-sm">
                    <div class="w-12 h-12 rounded-xl bg-brand-50 flex items-center justify-center text-brand-600 flex-shrink-0 border border-brand-100">
                        <i class="fa-solid fa-hospital text-xl"></i>
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-1">
                            <h3 class="text-base font-bold text-slate-900">City General Hospital</h3>
                            <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-md text-xs font-bold bg-red-50 text-red-700 border border-red-100">
                                <span class="w-2 h-2 rounded-full bg-priority-a"></span> Priority A
                            </span>
                        </div>
                        <p class="text-sm text-slate-500 flex items-center gap-2">
                            <i class="fa-solid fa-check-circle text-brand-500"></i>
                            Outcome: <span class="font-medium text-slate-700">Completed</span>
                        </p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Form Fields Left Column -->
                    <div class="space-y-6">
                        <!-- Notes Field -->
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <label class="block text-sm font-semibold text-slate-700">Visit Notes</label>
                                <span class="text-xs font-medium text-slate-400">0 / 250</span>
                            </div>
                            <textarea 
                                class="w-full appearance-none bg-white border border-slate-200 text-slate-900 text-sm rounded-xl focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 block p-4 shadow-sm placeholder-slate-400 min-h-[160px] resize-none transition-all" 
                                placeholder="Add key takeaways, action items, or follow-up requirements... (Optional)"
                                maxlength="250"
                            ></textarea>
                        </div>
                    </div>

                    <!-- Form Fields Right Column -->
                    <div class="space-y-6">
                        <!-- Photo Attachment -->
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Attachment</label>
                            <button class="w-full border-2 border-dashed border-slate-300 rounded-xl p-6 flex flex-col items-center justify-center text-slate-500 hover:bg-slate-50 hover:border-brand-400 transition-all group bg-white h-[160px]">
                                <div class="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center mb-3 group-hover:bg-brand-50 group-hover:text-brand-600 transition-colors border border-slate-100 group-hover:border-brand-200">
                                    <i class="fa-solid fa-cloud-arrow-up text-xl"></i>
                                </div>
                                <span class="text-sm font-semibold text-slate-700 group-hover:text-brand-700">Click to upload or drag & drop</span>
                                <span class="text-xs text-slate-400 mt-1">PNG, JPG up to 5MB (Optional)</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Next Visit Toggle (Full Width) -->
                <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <label class="text-base font-semibold text-slate-900 block">Schedule Next Visit?</label>
                            <span class="text-sm text-slate-500">Automatically add to your upcoming planning cycle</span>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" value="" class="sr-only peer" checked>
                            <div class="w-14 h-7 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-brand-500"></div>
                        </label>
                    </div>
                    
                    <!-- Auto-suggested Date -->
                    <div class="bg-slate-50 rounded-xl p-4 flex items-center justify-between border border-slate-200">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-lg bg-white border border-slate-200 flex flex-col items-center justify-center overflow-hidden shadow-sm">
                                <div class="w-full bg-red-500 h-3 flex items-center justify-center">
                                    <span class="text-[8px] font-bold text-white uppercase tracking-wider">Oct</span>
                                </div>
                                <span class="text-lg font-bold text-slate-800 mt-0.5">14</span>
                            </div>
                            <div>
                                <div class="text-sm font-semibold text-slate-900">Suggested based on frequency: 3 weeks</div>
                                <div class="text-sm text-slate-500 mt-0.5">Monday, October 14, 2023</div>
                            </div>
                        </div>
                        <button class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-slate-700 text-sm font-medium hover:bg-slate-50 hover:text-brand-600 transition-colors shadow-sm">
                            Change Date
                        </button>
                    </div>
                </div>

            </div>

            <!-- Footer CTA -->
            <div class="px-8 py-5 border-t border-slate-200 bg-slate-50 shrink-0 flex items-center justify-end gap-3">
                <button class="px-6 py-2.5 rounded-xl font-medium text-slate-600 hover:bg-slate-200 transition-colors">
                    Cancel
                </button>
                <button class="bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 px-8 rounded-xl shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2">
                    Submit Activity
                    <i class="fa-solid fa-check"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden Success Toast (For demonstration) -->
    <div id="success-toast" class="absolute top-4 left-4 right-4 z-50 hidden">
        <div class="bg-slate-900 text-white px-4 py-3 rounded-xl shadow-lg flex items-center justify-between max-w-md mx-auto">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-brand-500 flex items-center justify-center text-white">
                    <i class="fa-solid fa-check"></i>
                </div>
                <div>
                    <div class="text-sm font-bold">Activity Logged</div>
                    <div class="text-xs text-slate-300">City General Hospital</div>
                </div>
            </div>
            <button class="text-slate-400 hover:text-white">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>

    <script>
        // Simple script to demonstrate the toast interaction
        document.querySelector('.bg-brand-600').addEventListener('click', function() {
            // Hide modal
            document.querySelector('.modal-overlay').style.display = 'none';
            
            // Show toast
            const toast = document.getElementById('success-toast');
            toast.classList.remove('hidden');
            toast.classList.add('toast-enter');
            
            // Auto dismiss toast
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('toast-enter');
            }, 3000);
        });
    </script>
</body>
</html>
