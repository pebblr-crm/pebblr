# Kind cluster configuration for local Pebblr development.
# Mirrors AKS configuration where possible.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: pebblr-local
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # API server
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      # Ingress HTTP
      - containerPort: 80
        hostPort: 8081
        protocol: TCP
      # Ingress HTTPS
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
  - role: worker
  - role: worker
