apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "pebblr.fullname" . }}-migrate-{{ .Release.Revision }}-{{ now | date "20060102150405" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pebblr.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "pebblr.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      serviceAccountName: {{ include "pebblr.serviceAccountName" . }}
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      volumes:
        - name: secrets
          secret:
            secretName: {{ include "pebblr.secretName" . }}
            defaultMode: 0400
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /app/migrate
            - -dsn-file
            - {{ .Values.secrets.mountPath }}/{{ .Values.secrets.dbUrlKey }}
            - -migrations-path
            - /app/migrations
          volumeMounts:
            - name: secrets
              mountPath: {{ .Values.secrets.mountPath }}
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
