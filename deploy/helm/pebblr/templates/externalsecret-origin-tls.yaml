{{- if and .Values.tls.enabled (eq .Values.tls.mode "origin") .Values.externalSecrets.enabled -}}
# Pulls Cloudflare Origin CA cert + key from Azure KeyVault into a TLS secret.
# The secret is created in istio-system so the Istio Gateway can reference it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "pebblr.fullname" . }}-origin-tls
  namespace: {{ .Values.istio.gatewayNamespace | default "istio-system" }}
  labels:
    {{- include "pebblr.labels" . | nindent 4 }}
spec:
  refreshInterval: 24h
  # ClusterSecretStore (not SecretStore) because this ExternalSecret lives in
  # istio-system, outside the app namespace where the namespace-scoped SecretStore exists.
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ include "pebblr.fullname" . }}-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
      data:
        tls.crt: '{{ "{{ .cert }}" }}'
        tls.key: '{{ "{{ .key }}" }}'
  data:
    - secretKey: cert
      remoteRef:
        key: {{ .Values.tls.origin.certKeyVaultKey }}
    - secretKey: key
      remoteRef:
        key: {{ .Values.tls.origin.privateKeyKeyVaultKey }}
{{- end }}
