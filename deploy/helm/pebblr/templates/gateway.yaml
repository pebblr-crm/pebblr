{{- if .Values.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "pebblr.fullname" . }}-gw
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pebblr.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
    {{- if .Values.tls.enabled }}
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.tls.hostname | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ include "pebblr.fullname" . }}-tls
    {{- end }}
{{- end }}
