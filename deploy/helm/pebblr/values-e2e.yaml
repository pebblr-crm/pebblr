# E2E test values — deployed into a Kind cluster with in-cluster PostgreSQL.
# Not for production use.

externalSecrets:
  enabled: false

serviceAccount:
  annotations: {}

podAnnotations: {}

database:
  host: postgres.pebblr-e2e.svc.cluster.local
  port: "5432"
  name: pebblr
  user: pebblr
  sslMode: disable

auth:
  tenantId: e2e-placeholder
  clientId: e2e-placeholder
  issuerUrl: https://login.microsoftonline.com/e2e-placeholder/v2.0

gateway:
  enabled: false

tls:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Health endpoint is behind auth middleware, so use exec probes for e2e.
livenessProbe:
  exec:
    command:
      - wget
      - --no-check-certificate
      - --spider
      - "--header=Authorization: Bearer e2e-probe-token"
      - -q
      - http://localhost:8080/api/v1/health
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  exec:
    command:
      - wget
      - --no-check-certificate
      - --spider
      - "--header=Authorization: Bearer e2e-probe-token"
      - -q
      - http://localhost:8080/api/v1/health
  initialDelaySeconds: 3
  periodSeconds: 5
