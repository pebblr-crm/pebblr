# E2E test values — deployed into a Kind cluster with in-cluster PostgreSQL.
# Not for production use.

externalSecrets:
  enabled: false

serviceAccount:
  annotations: {}

podAnnotations: {}

database:
  host: postgres.pebblr-db.svc.cluster.local
  port: "5432"
  name: pebblr
  user: pebblr
  sslMode: disable

auth:
  tenantId: e2e-placeholder
  clientId: e2e-placeholder
  issuerUrl: https://login.microsoftonline.com/e2e-placeholder/v2.0

gateway:
  enabled: false

tls:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Use /healthz which is outside auth middleware.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
