# AKS cluster values — Istio ingress, External Secrets from Azure KeyVault.
# Runs in demo mode so prospects can explore the app without Azure AD.

auth:
  provider: "demo"

gateway:
  enabled: false

istio:
  enabled: true
  host: "demo.pebblr.net"
  gatewayName: pebblr-gateway
  gatewayNamespace: istio-system
  createGateway: true

tls:
  enabled: true
  mode: origin
  hostname: "demo.pebblr.net"
  origin:
    certKeyVaultKey: "origin-tls-cert"
    privateKeyKeyVaultKey: "origin-tls-key"

# TODO: Enable once SecretStore is provisioned in the AKS cluster.
# The header says "External Secrets from Azure KeyVault" but ESO is disabled.
externalSecrets:
  enabled: false

secrets:
  demoSigningKeyKey: demo-signing-key

database:
  host: postgres.pebblr-db.svc.cluster.local
  sslMode: disable
