# Local Kind cluster values — TLS via cert-manager self-signed CA.
# Not for production use.

externalSecrets:
  enabled: false

secrets:
  dbPassword: pebblr-local
  jwtSecret: local-jwt-secret-not-for-production

serviceAccount:
  annotations: {}

podAnnotations: {}

database:
  host: postgres.pebblr-db.svc.cluster.local
  sslMode: disable

auth:
  tenantId: "local-placeholder"
  clientId: "local-placeholder"
  issuerUrl: "https://login.microsoftonline.com/local-placeholder/v2.0"

gateway:
  enabled: true
  className: eg

tls:
  enabled: true
  mode: selfsigned
  hostname: pebblr.local
