name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.5"

      - name: Install frontend dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Run tests
        run: make test

      - name: Run typecheck
        run: make typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.5"

      - name: Install frontend dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.0.2

      - name: Run ESLint
        run: cd web && bun run lint

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Lint Helm chart
        run: helm lint deploy/helm/pebblr
