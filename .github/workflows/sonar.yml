name: SonarCloud

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  go-coverage:
    name: Go Coverage
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Run Go tests with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Upload Go coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 1

  frontend-unit-coverage:
    name: Frontend Unit Coverage
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.5"

      - name: Install dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Run unit tests with coverage
        run: cd web && bun run test -- --coverage

      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-unit-coverage
          path: web/coverage/lcov.info
          retention-days: 1

  frontend-e2e-coverage:
    name: Frontend E2E Coverage
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.5"

      - name: Install dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd web && bunx playwright install --with-deps chromium

      - name: Run E2E tests with coverage
        run: cd web && bun run test:e2e

      - name: Upload E2E coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-e2e-coverage
          path: web/coverage-e2e/lcov.info
          retention-days: 1
          if-no-files-found: warn

  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [go-coverage, frontend-unit-coverage, frontend-e2e-coverage]
    if: always() && github.actor != 'dependabot[bot]' && needs.go-coverage.result == 'success' && needs.frontend-unit-coverage.result == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for blame data

      - name: Download Go coverage
        uses: actions/download-artifact@v4
        with:
          name: go-coverage

      - name: Download frontend unit coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-unit-coverage
          path: web/coverage

      - name: Download frontend E2E coverage
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: frontend-e2e-coverage
          path: web/coverage-e2e

      - name: Merge frontend coverage reports
        run: |
          if [ -f web/coverage-e2e/lcov.info ]; then
            echo "Merging unit + E2E coverage..."
            cat web/coverage-e2e/lcov.info >> web/coverage/lcov.info
          else
            echo "No E2E coverage found; using unit coverage only."
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
