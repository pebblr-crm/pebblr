name: SonarCloud

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for blame data

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.5"

      - name: Install frontend dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Run Go tests with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Run frontend unit tests with coverage
        run: cd web && bun run test -- --coverage

      - name: Install Playwright browsers
        run: cd web && bunx playwright install --with-deps chromium

      - name: Run Playwright E2E tests with coverage
        run: cd web && bun run test:e2e

      - name: Merge unit + E2E coverage
        run: cd web && bun run coverage:merge

      - name: Verify coverage report exists
        run: test -f web/coverage/lcov.info && echo "Coverage report found" || (echo "ERROR: No coverage report" && exit 1)

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
