name: E2E

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Spin up Kind cluster
        run: make cluster-up

      - name: Validate Helm chart installs
        run: make helm-validate

      - name: Run E2E tests
        run: make e2e
