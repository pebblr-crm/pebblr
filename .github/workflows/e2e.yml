name: E2E

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.5"

      - name: Install frontend dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: pebblr-local
          config: deploy/kind/kind-config.yaml

      - name: Deploy PostgreSQL
        run: |
          kubectl apply -f deploy/k8s/e2e/postgres.yaml
          kubectl rollout status deployment/postgres -n pebblr-e2e --timeout=120s
          kubectl wait pod -l app=postgres -n pebblr-e2e --for=condition=Ready --timeout=120s

      - name: Run migrations and seed data
        run: |
          kubectl create configmap e2e-migrations \
            --from-file=migrations/ \
            --from-file=scripts/seed-data.sql \
            -n pebblr-e2e \
            --dry-run=client -o yaml | kubectl apply -f -

          cat <<'EOF' | kubectl apply -n pebblr-e2e -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: e2e-migrate-seed
            namespace: pebblr-e2e
          spec:
            backoffLimit: 3
            ttlSecondsAfterFinished: 300
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: migrate
                    image: postgres:16-alpine
                    command:
                      - sh
                      - -c
                      - |
                        set -e
                        export PGPASSWORD="pebblr-e2e-password"
                        PSQL="psql -h postgres.pebblr-e2e.svc.cluster.local -U pebblr -d pebblr"
                        for f in /migrations/*.up.sql; do
                          echo "  -> $(basename "$f")"
                          $PSQL -f "$f"
                        done
                        $PSQL -f /seed/seed-data.sql
                    volumeMounts:
                      - name: migrations
                        mountPath: /migrations
                      - name: seed
                        mountPath: /seed
                    resources:
                      limits:
                        cpu: 200m
                        memory: 128Mi
                volumes:
                  - name: migrations
                    configMap:
                      name: e2e-migrations
                      items:
                        - key: 001_initial_schema.up.sql
                          path: 001_initial_schema.up.sql
                        - key: 002_lead_soft_delete.up.sql
                          path: 002_lead_soft_delete.up.sql
                  - name: seed
                    configMap:
                      name: e2e-migrations
                      items:
                        - key: seed-data.sql
                          path: seed-data.sql
          EOF

          kubectl wait job/e2e-migrate-seed -n pebblr-e2e --for=condition=Complete --timeout=120s

      - name: Create app secrets
        run: |
          kubectl create secret generic pebblr-e2e-pebblr-secrets \
            --from-literal=db-dsn="postgres://pebblr:pebblr-e2e-password@postgres.pebblr-e2e.svc.cluster.local:5432/pebblr?sslmode=disable" \
            --from-literal=db-url="postgres://pebblr:pebblr-e2e-password@postgres.pebblr-e2e.svc.cluster.local:5432/pebblr?sslmode=disable" \
            --from-literal=db-password="pebblr-e2e-password" \
            --from-literal=jwt-secret="e2e-jwt-secret-not-for-production" \
            -n pebblr-e2e

      - name: Build and load Docker image
        run: |
          docker build -t pebblr-api:e2e .
          kind load docker-image pebblr-api:e2e --name pebblr-local

      - name: Deploy app via Helm
        run: |
          helm upgrade --install pebblr-e2e deploy/helm/pebblr \
            --namespace pebblr-e2e \
            --values deploy/helm/pebblr/values-e2e.yaml \
            --set image.tag=e2e \
            --wait \
            --timeout 120s
          kubectl rollout status deployment/pebblr-e2e-pebblr -n pebblr-e2e --timeout=120s

      - name: Run E2E tests
        run: make e2e

      - name: Collect debug info on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n pebblr-e2e -o wide
          echo ""
          echo "=== Pod logs ==="
          kubectl logs -n pebblr-e2e -l app.kubernetes.io/name=pebblr --tail=100 || true
          echo ""
          echo "=== Pod describe ==="
          kubectl describe pods -n pebblr-e2e -l app.kubernetes.io/name=pebblr || true
          echo ""
          echo "=== Events ==="
          kubectl get events -n pebblr-e2e --sort-by='.lastTimestamp' || true
