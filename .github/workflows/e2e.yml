name: E2E

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.5"

      - name: Install frontend dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Install Kind
        run: |
          [ -x "$(command -v kind)" ] && exit 0
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create Kind cluster
        run: make e2e-cluster

      - name: Deploy PostgreSQL, run migrations, create secrets
        run: make e2e-db

      - name: Build and load Docker image
        run: make e2e-image

      - name: Deploy app via Helm
        run: make e2e-deploy

      - name: Run E2E tests
        run: make e2e

      - name: Collect debug info on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n pebblr-e2e -o wide
          echo ""
          echo "=== Pod logs ==="
          kubectl logs -n pebblr-e2e -l app.kubernetes.io/name=pebblr --tail=100 || true
          echo ""
          echo "=== Pod describe ==="
          kubectl describe pods -n pebblr-e2e -l app.kubernetes.io/name=pebblr || true
          echo ""
          echo "=== Events ==="
          kubectl get events -n pebblr-e2e --sort-by='.lastTimestamp' || true
